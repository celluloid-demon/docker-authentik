---
services:
  ak-postgresql:
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password

    secrets:
    - pg_password

  ak-server:
    environment:
      AUTHENTIK_POSTGRESQL__PASSWORD: file:///run/secrets/pg_password
      AUTHENTIK_SECRET_KEY: file:///run/secrets/authentik_secret_key

    secrets:
    - pg_password
    - authentik_secret_key
    - authentik_email_password

  ak-worker:
    environment:
      AUTHENTIK_POSTGRESQL__PASSWORD: file:///run/secrets/pg_password
      AUTHENTIK_SECRET_KEY: file:///run/secrets/authentik_secret_key

    secrets:
    - pg_password
    - authentik_secret_key
    - authentik_email_password

secrets:
  pg_password:
    file: ${SECRETS}/PG_PASSWORD

  authentik_secret_key:
    file: ${SECRETS}/AUTHENTIK_SECRET_KEY

  authentik_email_password:
    file: ${SECRETS}/AUTHENTIK_EMAIL_PASSWORD
