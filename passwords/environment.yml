---
services:
  ak-postgresql:
    environment:
      POSTGRES_PASSWORD: ${PG_PASSWORD:?database password required}

  ak-server:
    environment:
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}

  ak-worker:
    environment:
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
