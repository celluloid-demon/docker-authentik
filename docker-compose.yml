services:
  postgresql:
    env_file:
    - .env
    environment:
      POSTGRES_DB: ${PG_DB:-authentik}
      # POSTGRES_PASSWORD: ${PG_PASS:?database password required}
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_pass
      POSTGRES_USER: ${PG_USER:-authentik}
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
      - CMD-SHELL
      - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      timeout: 5s
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    volumes:
    - db:/var/lib/postgresql/data
    secrets:
    - pg_pass

  server:
    command: server
    depends_on:
      postgresql:
        condition: service_healthy
    env_file:
    - .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      # AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__PASSWORD: file:///run/secrets/pg_pass
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      # AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
      AUTHENTIK_SECRET_KEY: file:///run/secrets/authentik_secret_key
    # WARNING: IMAGE VERSIONS MUST MATCH FOR SERVER, WORKER, PROXY OUTPOSTS, ETC...
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.1}
    ports:
    - ${COMPOSE_PORT_HTTP:-9000}:9000
    - ${COMPOSE_PORT_HTTPS:-9443}:9443
    restart: unless-stopped
    shm_size: 512mb
    volumes:
    - ${BIND_MOUNTS}/data:/data
    - ${BIND_MOUNTS}/custom-templates:/templates
    secrets:
    - authentik_secret_key
    - pg_pass
    - authentik_email_password

  worker:
    command: worker
    depends_on:
      postgresql:
        condition: service_healthy
    env_file:
    - .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      # AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__PASSWORD: file:///run/secrets/pg_pass
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      # AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
      AUTHENTIK_SECRET_KEY: file:///run/secrets/authentik_secret_key
    # WARNING: IMAGE VERSIONS MUST MATCH FOR SERVER, WORKER, PROXY OUTPOSTS, ETC...
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2026.2.1}
    restart: unless-stopped
    shm_size: 512mb
    user: root
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ${BIND_MOUNTS}/data:/data
    - ${BIND_MOUNTS}/certs:/certs
    - ${BIND_MOUNTS}/custom-templates:/templates
    secrets:
    - authentik_secret_key
    - pg_pass
    - authentik_email_password

volumes:
  # database:
  #   driver: local
  db:
    driver: local

secrets:
  authentik_secret_key:
    file: ${SECRETS}/AUTHENTIK_SECRET_KEY
  pg_pass:
    file: ${SECRETS}/PG_PASS
  authentik_email_password:
    file: ${SECRETS}/AUTHENTIK_EMAIL_PASSWORD
